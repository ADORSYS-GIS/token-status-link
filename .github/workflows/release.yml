name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    name: Build and Publish Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Extract version from tag
        id: version
        run: |
          TAG="$GITHUB_REF_NAME"
          echo "TAG=$TAG" >> "$GITHUB_OUTPUT"
          echo "VERSION=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Derive groupId from repository owner
        id: groupid
        run: |
          OWNER="${{ github.repository_owner }}"
          GROUP_ID="io.github.${OWNER,,}"
          echo "GROUP_ID=$GROUP_ID" >> "$GITHUB_OUTPUT"

      - name: Set groupId in pom.xml
        run: |
          sed -i "s|<groupId>io\.github\.adorsys-gis</groupId>|<groupId>${{ steps.groupid.outputs.GROUP_ID }}</groupId>|" pom.xml

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "17"
          cache: "maven"
          server-id: central
          server-username: MAVEN_CENTRAL_USERNAME
          server-password: MAVEN_CENTRAL_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE

      - name: Make Maven Wrapper executable
        run: chmod +x mvnw

      - name: Build and Release Artifacts
        run: ./mvnw clean deploy -Prelease -DskipTests -Drevision=${{ steps.version.outputs.VERSION }} --batch-mode
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.CENTRAL_TOKEN_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.CENTRAL_TOKEN_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.TAG }}
          files: target/keycloak-token-status-plugin-*.jar
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
